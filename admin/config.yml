backend:
  name: git-gateway
  branch: main

media_folder: "assets/images/noticias"
public_folder: "/assets/images/noticias"
locale: 'es'

collections:
  - name: "noticias"
    label: "Noticias"
    folder: "content/noticias"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Fecha", name: "date", widget: "datetime"}
      - {label: "Resumen", name: "excerpt", widget: "text"}
      - {label: "Imagen principal", name: "image", widget: "image", required: false}
      - {label: "Contenido", name: "body", widget: "markdown"}
      - {label: "Publicado", name: "published", widget: "boolean", default: true}
